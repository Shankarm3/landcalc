<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta
         name="google-site-verification"
         content="6YxRchjdN3Gjf_fjXVlu-ENIzWiSG-mLYRP14uSGF-M"
      />
      <title>LandCalc</title>

      <meta
         name="description"
         content="Land area converter and property tools."
      />

      <link rel="preconnect" href="https://fonts.googleapis.com" />

      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      <link
         href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
         rel="stylesheet"
      />

      <link rel="stylesheet" href="style.css" />
   </head>

   <body>
      <nav class="navbar">LandCalc</nav>

      <section class="hero">
         <h1>Smart Land Area Converter</h1>

         <p>Convert Kanal, Acre, Bigha and Gaj instantly.</p>
      </section>

      <div class="container">
         <div class="card">
            <h2>Area Converter</h2>

            <input type="number" id="inputValue" placeholder="Enter value" />

            <select id="fromUnit">
               <option value="sqft">Square Feet</option>

               <option value="gaj">Gaj</option>

               <option value="kanal">Kanal</option>

               <option value="bigha">Bigha</option>

               <option value="acre">Acre</option>
            </select>

            <select id="toUnit">
               <option value="sqft">Square Feet</option>

               <option value="gaj">Gaj</option>

               <option value="kanal">Kanal</option>

               <option value="bigha">Bigha</option>

               <option value="acre">Acre</option>
            </select>

            <button onclick="convertArea()">Convert Area</button>

            <div class="result-box">
               <h3>Converted Value</h3>

               <div id="result">0</div>
            </div>
         </div>
         <div class="card" style="margin-top: 20px">
            <h2>Popular Pages</h2>

            <ul style="margin-top: 20px; line-height: 2">
               <li>
                  <a href="kanal-to-sqft.html"> 1 Kanal to Square Feet </a>
               </li>

               <li>
                  <a href="gaj-to-sqft.html"> 1 Gaj to Square Feet </a>
               </li>

               <li>
                  <a href="acre-to-kanal.html"> 1 Acre to Kanal </a>
               </li>
            </ul>
         </div>
      </div>

      <script src="app.js"></script>
   </body>
</html>
